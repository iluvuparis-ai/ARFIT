<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARFit">
<meta name="theme-color" content="#0a0a0c">
<title>ARFit</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<!-- PWA Manifest inline -->
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22ARFit%22%2C%22short_name%22%3A%22ARFit%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0c%22%2C%22theme_color%22%3A%22%230a0a0c%22%7D">

<style>
:root {
  --bg: #0a0a0c;
  --surface: #13141a;
  --card: #1a1b24;
  --border: #252632;
  --accent: #e8ff47;
  --accent2: #ff6b35;
  --text: #f0f0f5;
  --muted: #5a5c6e;
  --muted2: #8a8ca0;
  --upper: #4a9eff;
  --lower: #b07cff;
  --push: #ff6b35;
  --pull: #4ecb71;
  --full: #f0c040;
  --core: #ff4e8c;
  --green: #22c55e;
  --red: #ef4444;
  --safe: env(safe-area-inset-bottom, 20px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

/* ── SCREENS ── */
.screen { display: none; position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.screen.active { display: flex; flex-direction: column; animation: fadeUp 0.25s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ── SPLASH ── */
#splash {
  background: radial-gradient(ellipse at 30% 20%, rgba(232,255,71,0.08) 0%, transparent 55%),
              radial-gradient(ellipse at 80% 80%, rgba(74,158,255,0.06) 0%, transparent 50%),
              var(--bg);
  align-items: center; justify-content: center; flex-direction: column; gap: 0;
}

.logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }

.logo-svg { width: 110px; height: 110px; filter: drop-shadow(0 0 30px rgba(232,255,71,0.3)); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { filter: drop-shadow(0 0 20px rgba(232,255,71,0.25)); } 50% { filter: drop-shadow(0 0 40px rgba(232,255,71,0.5)); } }

.logo-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 52px; font-weight: 900; letter-spacing: 4px;
  color: var(--text);
  background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.logo-tagline { font-size: 13px; font-weight: 600; letter-spacing: 3px; color: var(--muted2); text-transform: uppercase; }

.splash-loading { margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.loading-bar { width: 120px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.loading-fill { height: 100%; background: var(--accent); border-radius: 2px; animation: load 1.2s ease forwards; }
@keyframes load { from { width: 0; } to { width: 100%; } }
.loading-text { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

/* ── NAV BAR ── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,14,20,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 12px 8px 10px;
  cursor: pointer; transition: all 0.2s;
  border: none; background: none; color: var(--muted); font-family: 'Nunito', sans-serif;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

/* ── HOME SCREEN ── */
#home { padding: 0 0 80px; }

.home-header {
  padding: 56px 20px 24px;
  background: linear-gradient(180deg, rgba(232,255,71,0.04) 0%, transparent 100%);
}
.home-greeting { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--muted2); text-transform: uppercase; margin-bottom: 4px; }
.home-title { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 900; line-height: 1; }
.home-title em { color: var(--accent); font-style: normal; }
.home-date { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* STREAK / STATS ROW */
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 12px; text-align: center;
}
.stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900; line-height: 1; color: var(--accent); }
.stat-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-top: 3px; }

/* TODAY CARD */
.today-section { padding: 0 20px 16px; }
.section-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

.today-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 18px;
  overflow: hidden; cursor: pointer; transition: transform 0.15s, border-color 0.2s;
  position: relative;
}
.today-card:active { transform: scale(0.98); }
.today-card-accent { height: 4px; width: 100%; }
.today-card-body { padding: 18px 20px; }
.today-card-day {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px; font-weight: 900; letter-spacing: 0.5px; line-height: 1;
}
.today-card-focus { font-size: 13px; color: var(--muted2); margin-top: 4px; font-weight: 600; }
.today-card-progress { margin-top: 14px; }
.progress-bar-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.progress-text { font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 600; }
.today-card-arrow {
  position: absolute; right: 20px; top: 50%;
  transform: translateY(-50%);
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

/* REST DAY BUTTON */
.rest-btn {
  margin: 0 20px 20px; padding: 14px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 14px; color: var(--muted2);
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; width: calc(100% - 40px);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.rest-btn:active { transform: scale(0.98); }
.rest-btn.active { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }

/* WEEK MINI VIEW */
.week-row { display: flex; gap: 6px; padding: 0 20px 20px; }
.week-day {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 4px; text-align: center;
}
.week-day.today { border-color: var(--accent); }
.week-day-name { font-size: 9px; font-weight: 800; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
.week-day-icon { font-size: 16px; margin-top: 4px; }
.week-day-num { font-size: 10px; font-weight: 700; color: var(--muted2); margin-top: 2px; }

/* ── WORKOUT SCREEN ── */
#workout { padding: 0 0 80px; }

.workout-header { padding: 56px 20px 16px; position: relative; }
.back-btn {
  position: absolute; top: 56px; left: 20px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 14px;
  font-size: 12px; font-weight: 700; color: var(--muted2);
  cursor: pointer; display: flex; align-items: center; gap: 6px;
}
.workout-day-label { font-size: 11px; font-weight: 800; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; padding-top: 40px; }
.workout-day-title { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 900; line-height: 0.95; }
.workout-day-focus { font-size: 14px; color: var(--muted2); font-weight: 600; margin-top: 6px; }

.warmup-card {
  margin: 0 20px 16px;
  background: rgba(232,255,71,0.05); border: 1px solid rgba(232,255,71,0.15);
  border-radius: 14px; padding: 14px 16px;
  font-size: 12.5px; color: var(--muted2); line-height: 1.6;
}
.warmup-card b { color: var(--text); }

/* EXERCISE LIST */
.ex-section { padding: 0 20px; margin-bottom: 10px; }
.ex-section-title {
  font-size: 10px; font-weight: 800; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.ex-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.ex-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 8px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.ex-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 2px 0 0 2px;
}
.ex-item:active { transform: scale(0.98); }
.ex-item.done { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.25); }
.ex-item.done::before { background: var(--green); }

.ex-check {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.2s;
}
.ex-item.done .ex-check { background: var(--green); border-color: var(--green); }

.ex-info-wrap { flex: 1; }
.ex-item-name { font-weight: 700; font-size: 14px; line-height: 1.2; }
.ex-item-name.done { color: var(--muted2); text-decoration: line-through; }
.ex-item-detail { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.ex-item-equip {
  font-size: 9.5px; font-weight: 800; letter-spacing: 1px;
  padding: 2px 8px; border-radius: 100px; margin-top: 5px;
  display: inline-block;
}
.eq-ss3 { background: rgba(74,158,255,0.12); color: #4a9eff; }
.eq-db  { background: rgba(240,192,64,0.12);  color: #f0c040; }
.eq-bw  { background: rgba(78,203,113,0.12);  color: #4ecb71; }

.ex-item-sets { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: var(--muted2); flex-shrink: 0; }

/* CORE FINISHER */
.core-section {
  margin: 0 20px 16px;
  background: rgba(255,78,140,0.06); border: 1px solid rgba(255,78,140,0.2);
  border-radius: 14px; overflow: hidden;
}
.core-header {
  padding: 12px 16px; background: rgba(255,78,140,0.08);
  font-size: 11px; font-weight: 800; letter-spacing: 2px;
  color: var(--core); text-transform: uppercase;
}

/* COMPLETE DAY BTN */
.complete-day-btn {
  margin: 16px 20px 0;
  padding: 18px; border-radius: 16px;
  background: var(--accent); border: none; color: #000;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 900; letter-spacing: 1px;
  cursor: pointer; transition: all 0.2s; width: calc(100% - 40px);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.complete-day-btn:active { transform: scale(0.97); }
.complete-day-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
.complete-day-btn.partial { background: var(--card); border: 1px solid var(--accent); color: var(--accent); }

/* ── DASHBOARD SCREEN ── */
#dashboard { padding: 0 0 80px; }

.dash-header { padding: 56px 20px 20px; }
.dash-title { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 900; }
.dash-title em { color: var(--accent); font-style: normal; }

.dash-tabs { display: flex; gap: 8px; padding: 0 20px 20px; }
.dash-tab {
  padding: 8px 18px; border-radius: 100px; cursor: pointer;
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  border: 1px solid var(--border); background: var(--card); color: var(--muted2);
  transition: all 0.2s;
}
.dash-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* BIG STATS */
.dash-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
.dash-stat {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px;
}
.dash-stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 900; line-height: 1; color: var(--accent); }
.dash-stat-lbl { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

/* CALENDAR */
.cal-wrap { padding: 0 20px; }
.cal-month-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.cal-nav { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 16px; color: var(--muted2); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-dow { text-align: center; font-size: 9px; font-weight: 800; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; padding: 4px 0 8px; }
.cal-day {
  aspect-ratio: 1; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; position: relative;
  border: 1px solid transparent; transition: all 0.15s;
}
.cal-day.empty { background: transparent; }
.cal-day.future { background: var(--card); color: var(--muted); border-color: var(--border); }
.cal-day.today { border-color: var(--accent) !important; }
.cal-day.completed { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: var(--green); }
.cal-day.rest { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: var(--red); }
.cal-day.partial { background: rgba(240,192,64,0.1); border-color: rgba(240,192,64,0.2); color: var(--full); }
.cal-day.skipped { background: rgba(90,92,110,0.1); border-color: var(--border); color: var(--muted); }
.cal-day-num { font-size: 12px; font-weight: 700; line-height: 1; }
.cal-day-icon { font-size: 10px; margin-top: 1px; line-height: 1; }

/* LEGEND */
.cal-legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 14px 20px 20px; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted2); font-weight: 600; }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; }

/* DAY TYPE BREAKDOWN */
.day-type-row { padding: 0 20px 20px; }
.day-type-bars { display: flex; flex-direction: column; gap: 8px; }
.dt-bar { display: flex; align-items: center; gap: 10px; }
.dt-label { font-size: 12px; font-weight: 700; color: var(--muted2); width: 70px; flex-shrink: 0; }
.dt-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.dt-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.dt-count { font-size: 12px; font-weight: 800; color: var(--text); width: 24px; text-align: right; flex-shrink: 0; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--card); border: 1px solid var(--border);
  border-radius: 100px; padding: 10px 20px;
  font-size: 13px; font-weight: 700; color: var(--text);
  opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── CELEBRATION OVERLAY ── */
.celebrate {
  position: fixed; inset: 0; z-index: 300;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85); flex-direction: column; gap: 16px;
}
.celebrate.show { display: flex; animation: fadeUp 0.3s ease; }
.celebrate-icon { font-size: 72px; animation: bounce 0.6s ease infinite alternate; }
@keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
.celebrate-title { font-family: 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }
.celebrate-sub { font-size: 14px; color: var(--muted2); font-weight: 600; }
.celebrate-close {
  margin-top: 10px; padding: 14px 36px;
  background: var(--accent); border: none; border-radius: 100px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900;
  color: #000; cursor: pointer; letter-spacing: 1px;
}

/* SCROLL PAD */
.scroll-pad { height: 20px; }

/* Color utilities */
.c-upper { color: var(--upper); } .c-lower { color: var(--lower); }
.c-push  { color: var(--push);  } .c-pull  { color: var(--pull);  }
.c-full  { color: var(--full);  } .c-core  { color: var(--core);  }
.bg-upper { background: var(--upper); } .bg-lower { background: var(--lower); }
.bg-push  { background: var(--push);  } .bg-pull  { background: var(--pull);  }
.bg-full  { background: var(--full);  }
</style>
</head>
<body>

<!-- SCREENS -->
<div id="splash" class="screen active">
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 110 110" fill="none">
      <!-- Hexagon background -->
      <polygon points="55,4 100,28 100,82 55,106 10,82 10,28" fill="#1a1b24" stroke="#e8ff47" stroke-width="2"/>
      <!-- Dumbbell icon -->
      <rect x="28" y="50" width="54" height="10" rx="5" fill="#e8ff47"/>
      <rect x="20" y="42" width="14" height="26" rx="5" fill="#e8ff47"/>
      <rect x="76" y="42" width="14" height="26" rx="5" fill="#e8ff47"/>
      <rect x="14" y="47" width="12" height="16" rx="4" fill="#e8ff47" opacity="0.7"/>
      <rect x="84" y="47" width="12" height="16" rx="4" fill="#e8ff47" opacity="0.7"/>
      <!-- AR letters faint -->
      <text x="55" y="36" font-family="'Barlow Condensed',sans-serif" font-size="11" font-weight="900" fill="#e8ff47" text-anchor="middle" opacity="0.6">ARFIT</text>
    </svg>
    <div class="logo-name">ARFIT</div>
    <div class="logo-tagline">Your personal strength coach</div>
    <div class="splash-loading">
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <div class="loading-text">Loading your plan...</div>
    </div>
  </div>
</div>

<div id="home" class="screen">
  <div class="home-header">
    <div class="home-greeting">Good morning</div>
    <div class="home-title">Ready to<br><em>TRAIN?</em></div>
    <div class="home-date" id="home-date"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="stat-streak">0</div>
      <div class="stat-lbl">Day Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-lbl">Workouts</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-week">0</div>
      <div class="stat-lbl">This Week</div>
    </div>
  </div>

  <div class="today-section">
    <div class="section-label">Today's Session</div>
    <div class="today-card" id="today-card" onclick="goToWorkout()">
      <div class="today-card-accent" id="today-accent"></div>
      <div class="today-card-body">
        <div class="today-card-day" id="today-day-title">Loading...</div>
        <div class="today-card-focus" id="today-day-focus"></div>
        <div class="today-card-progress" id="today-progress-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="today-progress-bar"></div></div>
          <div class="progress-text" id="today-progress-text"></div>
        </div>
      </div>
      <div class="today-card-arrow" id="today-arrow">›</div>
    </div>
  </div>

  <button class="rest-btn" id="rest-btn" onclick="toggleRestDay()">
    <span id="rest-icon">😴</span>
    <span id="rest-text">Mark Today as Rest Day</span>
  </button>

  <div class="today-section">
    <div class="section-label">This Week</div>
    <div class="week-row" id="week-row"></div>
  </div>

  <div class="scroll-pad"></div>
</div>

<div id="workout" class="screen">
  <div class="workout-header">
    <button class="back-btn" onclick="goHome()">‹ Home</button>
    <div class="workout-day-label" id="wd-label"></div>
    <div class="workout-day-title" id="wd-title"></div>
    <div class="workout-day-focus" id="wd-focus"></div>
  </div>
  <div class="warmup-card" id="wd-warmup"></div>
  <div id="wd-exercises"></div>
  <div style="padding:0 20px;">

    exercises: [
      { id:'thruster', name:'DB Thruster', sets:'4 × 10', muscle:'Quads · Glutes · Shoulders · Full Chain', equip:'DB — 7kg each · squat to press', type:'db', pair:'60s rest' },
      { id:'full-lat', name:'Lat Pulldown', sets:'3 × 10', muscle:'Lats · Upper Back · Biceps', equip:'SS3 — High Cable + Bar', type:'ss3', pair:'SS with #3' },

      { id:'full-dl', name:'DB Deadlift', sets:'3 × 10', muscle:'Posterior Chain · Glutes · Traps', equip:'DB — 12.5kg each', type:'db', pair:'SS with #5' },
      { id:'cable-upright', name:'Cable Upright Row', sets:'3 × 12', muscle:'Traps · Lateral Delt · Rhomboids', equip:'SS3 — Low Cable + Straight Bar', type:'ss3', pair:'60s after pair' },
      { id:'farmers', name:"Farmer's Carry + Plank", sets:'3 rounds', muscle:'Grip · Core · Traps · Stabilisers', equip:'DB — 12.5kg each · 20m + 20s plank', type:'db', pair:'45s rest' },
    ],
    hasCore: false
  }
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'arfit_data_v2';
let state = {
  log: {},          // { 'YYYY-MM-DD': { dayId, completed: [], isRest, isDone, isPartial } }
  currentDayIdx: 0, // which DAYS[] we're on today
  dashTab: 'month',
  dashMonth: new Date().getMonth(),
  dashYear: new Date().getFullYear(),
};

const today = () => new Date().toISOString().split('T')[0];
const todayKey = () => today();

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state.log = parsed.log || {};
      state.currentDayIdx = parsed.currentDayIdx ?? 0;
    }
  } catch(e){}
}

function computeCurrentDayIdx() {
  // Find last completed workout day, advance to next
  const keys = Object.keys(state.log).sort();
  for (let i = keys.length - 1; i >= 0; i--) {
    const entry = state.log[keys[i]];
    if (entry && entry.isDone && !entry.isRest) {
      const lastIdx = DAYS.findIndex(d => d.id === entry.dayId);
      if (lastIdx !== -1) {
        return (lastIdx + 1) % DAYS.length;
      }
    }
  }
  return state.currentDayIdx ?? 0;
}

function getTodayEntry() {
  return state.log[todayKey()] || null;
}

function ensureTodayEntry(dayId) {
  if (!state.log[todayKey()]) {
    state.log[todayKey()] = { dayId, completed: [], isRest: false, isDone: false };
    saveState();
  }
  return state.log[todayKey()];
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
let currentScreen = 'home';

function switchTab(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + (screen === 'workout' ? 'workout' : screen === 'dashboard' ? 'dashboard' : 'home')).classList.add('active');
  currentScreen = screen;
  if (screen === 'home') renderHome();
  if (screen === 'dashboard') renderDashboard();
}

function goToWorkout() {
  const idx = computeCurrentDayIdx();
  state.currentDayIdx = idx;
  renderWorkout(DAYS[idx]);
  switchTab('workout');
}

function goHome() {
  switchTab('home');
}

// ═══════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════
function renderHome() {
  const idx = computeCurrentDayIdx();
  const day = DAYS[idx];
  const entry = getTodayEntry();

  // Date
  const now = new Date();
  document.getElementById('home-date').textContent = now.toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // Today card
  const accent = document.getElementById('today-accent');
  const title = document.getElementById('today-day-title');
  const focus = document.getElementById('today-day-focus');
  const arrow = document.getElementById('today-arrow');

  if (entry && entry.isRest) {
    accent.style.background = '#ef4444';
    title.textContent = '😴 REST DAY';
    title.style.color = '#ef4444';
    focus.textContent = 'Recovery is part of the plan';
    document.getElementById('today-progress-wrap').style.display = 'none';
    arrow.style.display = 'none';
    document.getElementById('today-card').style.cursor = 'default';
  } else if (entry && entry.isDone) {
    accent.style.background = '#22c55e';
    title.textContent = '✅ ' + day.name;
    title.style.color = '#22c55e';
    focus.textContent = 'Completed · Next: ' + DAYS[(idx+1)%DAYS.length].name;
    document.getElementById('today-progress-wrap').style.display = 'none';
    arrow.textContent = '✓';
    arrow.style.background = 'rgba(34,197,94,0.15)';
    arrow.style.color = '#22c55e';
  } else {
    accent.style.background = day.color;
    title.textContent = day.label + ' — ' + day.name;
    title.style.color = day.color;
    focus.textContent = day.focus;
    document.getElementById('today-progress-wrap').style.display = 'block';
    arrow.textContent = '›';
    arrow.style.background = 'rgba(232,255,71,0.1)';
    arrow.style.color = '#e8ff47';

    const allEx = [...day.exercises, ...(day.hasCore ? day.core : [])];
    const doneCount = entry ? entry.completed.length : 0;
    const pct = allEx.length > 0 ? Math.round((doneCount / allEx.length) * 100) : 0;
    const bar = document.getElementById('today-progress-bar');
    bar.style.width = pct + '%';
    bar.style.background = day.color;
    document.getElementById('today-progress-text').textContent = doneCount + ' / ' + allEx.length + ' exercises completed';
  }

  // Stats
  const allEntries = Object.values(state.log);
  const completed = allEntries.filter(e => e.isDone && !e.isRest);
  document.getElementById('stat-total').textContent = completed.length;
  document.getElementById('stat-streak').textContent = calcStreak();

  // This week
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  let weekCount = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const key = d.toISOString().split('T')[0];
    const e = state.log[key];
    if (e && e.isDone && !e.isRest) weekCount++;
  }
  document.getElementById('stat-week').textContent = weekCount;

  // Rest btn
  const restBtn = document.getElementById('rest-btn');
  const restIcon = document.getElementById('rest-icon');
  const restText = document.getElementById('rest-text');
  if (entry && entry.isRest) {
    restBtn.classList.add('active');
    restIcon.textContent = '✕';
    restText.textContent = 'Remove Rest Day';
  } else {
    restBtn.classList.remove('active');
    restIcon.textContent = '😴';
    restText.textContent = 'Mark Today as Rest Day';
  }

  // Week strip
  renderWeekStrip(now, idx);
}

function renderWeekStrip(now, todayIdx) {
  const weekRow = document.getElementById('week-row');
  weekRow.innerHTML = '';
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const key = d.toISOString().split('T')[0];
    const entry = state.log[key];
    const isToday = key === todayKey();
    const isPast = d < new Date(now.toDateString());

    let icon = '·';
    if (entry && entry.isRest) icon = '😴';
    else if (entry && entry.isDone) icon = '✅';
    else if (entry && entry.completed && entry.completed.length > 0) icon = '⚡';
    else if (isPast && !isToday) icon = '—';

    const el = document.createElement('div');
    el.className = 'week-day' + (isToday ? ' today' : '');
    el.innerHTML = `<div class="week-day-name">${days[i]}</div><div class="week-day-icon">${icon}</div><div class="week-day-num">${d.getDate()}</div>`;
    weekRow.appendChild(el);
  }
}

function calcStreak() {
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() - i);
    const key = d.toISOString().split('T')[0];
    const entry = state.log[key];
    if (entry && (entry.isDone || entry.isRest)) streak++;
    else if (i > 0) break;
  }
  return streak;
}

function toggleRestDay() {
  const key = todayKey();
  if (!state.log[key]) state.log[key] = { dayId: DAYS[computeCurrentDayIdx()].id, completed: [], isRest: false, isDone: false };
  state.log[key].isRest = !state.log[key].isRest;
  if (state.log[key].isRest) {
    state.log[key].isDone = false;
    showToast('😴 Rest day marked');
  } else {
    showToast('Rest day removed');
  }
  saveState();
  renderHome();
}

// ═══════════════════════════════════════════════════
// WORKOUT SCREEN
// ═══════════════════════════════════════════════════
let activeDay = null;

function renderWorkout(day) {
  activeDay = day;
  const entry = ensureTodayEntry(day.id);

  document.getElementById('wd-label').textContent = day.label + ' · ' + new Date().toLocaleDateString('en-AU',{weekday:'long'});
  document.getElementById('wd-label').style.color = day.color;
  document.getElementById('wd-title').textContent = day.name;
  document.getElementById('wd-title').style.color = day.color;
  document.getElementById('wd-focus').textContent = day.focus;
  document.getElementById('wd-warmup').innerHTML = '<b>' + day.warmup.split(':')[0] + ':</b>' + day.warmup.split(':').slice(1).join(':');

  const container = document.getElementById('wd-exercises');
  container.innerHTML = '';

  // Main exercises
  const mainSection = document.createElement('div');
  mainSection.className = 'ex-section';
  const mainTitle = document.createElement('div');
  mainTitle.className = 'ex-section-title';
  mainTitle.textContent = 'Main Workout';
  mainSection.appendChild(mainTitle);

  day.exercises.forEach((ex, i) => {
    mainSection.appendChild(buildExItem(ex, i+1, entry, day, false));
  });
  container.appendChild(mainSection);

  // Core finisher
  if (day.hasCore) {
    const coreWrap = document.createElement('div');
    coreWrap.className = 'core-section';
    coreWrap.innerHTML = '<div class="core-header">🔩 CORE FINISHER — 8 min</div>';
    const coreInner = document.createElement('div');
    coreInner.style.padding = '8px';
    day.core.forEach((ex, i) => {
      coreInner.appendChild(buildExItem(ex, 'C'+(i+1), entry, day, true));
    });
    coreWrap.appendChild(coreInner);
    const csec = document.createElement('div');
    csec.style.padding = '0 20px 10px';
    csec.appendChild(coreWrap);
    container.appendChild(csec);
  }

  updateCompleteBtn(day, entry);
}

function buildExItem(ex, num, entry, day, isCore) {
  const done = entry.completed.includes(ex.id);
  const item = document.createElement('div');
  item.className = 'ex-item' + (done ? ' done' : '');
  item.id = 'ex-' + ex.id;
  item.style.setProperty('--ex-color', day.color);
  if (!done) item.style.cssText += `; border-left-color: transparent;`;
  else item.style.cssText += `; --ex-bc: var(--green);`;

  // Color the left strip
  if (!isCore) item.style.cssText += ``;

  const typeClass = ex.type === 'ss3' ? 'eq-ss3' : ex.type === 'db' ? 'eq-db' : 'eq-bw';
  const typeLabel = ex.type === 'ss3' ? '● SS3' : ex.type === 'db' ? '● Dumbbell' : '● Bodyweight';

  item.innerHTML = `
    <div class="ex-check">${done ? '✓' : ''}</div>
    <div class="ex-info-wrap">
      <div class="ex-item-name${done ? ' done' : ''}">${typeof num === 'number' ? num + '. ' : num + ' '}${ex.name}</div>
      <div class="ex-item-detail">${ex.muscle}</div>
      <span class="ex-item-equip ${typeClass}">${typeLabel} · ${ex.equip}</span>
    </div>
    <div class="ex-item-sets">${ex.sets.replace(' × ', '×\n')}</div>
  `;

  item.onclick = () => toggleExercise(ex.id, day, item);
  return item;
}

function toggleExercise(exId, day, el) {
  const entry = state.log[todayKey()];
  if (!entry || entry.isRest || entry.isDone) return;

  const idx = entry.completed.indexOf(exId);
  if (idx === -1) {
    entry.completed.push(exId);
    el.classList.add('done');
    el.querySelector('.ex-check').textContent = '✓';
    el.querySelector('.ex-item-name').classList.add('done');
  } else {
    entry.completed.splice(idx, 1);
    el.classList.remove('done');
    el.querySelector('.ex-check').textContent = '';
    el.querySelector('.ex-item-name').classList.remove('done');
  }
  saveState();
  updateCompleteBtn(day, entry);
}

function updateCompleteBtn(day, entry) {
  const btn = document.getElementById('complete-btn');
  const txt = document.getElementById('complete-btn-text');
  const allEx = [...day.exercises, ...(day.hasCore ? day.core : [])];
  const done = entry.completed.length;
  const total = allEx.length;

  if (entry.isDone) {
    btn.disabled = true;
    txt.textContent = 'DAY COMPLETED ✓';
  } else if (done === total && total > 0) {
    btn.disabled = false;
    btn.classList.remove('partial');
    txt.textContent = 'COMPLETE ALL ' + total + ' EXERCISES ✓';
  } else if (done > 0) {
    btn.disabled = false;
    btn.classList.add('partial');
    txt.textContent = 'MARK DONE (' + done + '/' + total + ')';
  } else {
    btn.disabled = false;
    btn.classList.add('partial');
    txt.textContent = 'MARK DAY COMPLETE';
  }
}

function completeDay() {
  const entry = state.log[todayKey()];
  if (!entry || entry.isRest) return;
  const allEx = [...activeDay.exercises, ...(activeDay.hasCore ? activeDay.core : [])];

  entry.isDone = true;
  entry.isPartial = entry.completed.length < allEx.length;
  // advance day index
  state.currentDayIdx = (DAYS.findIndex(d => d.id === activeDay.id) + 1) % DAYS.length;
  saveState();

  const btn = document.getElementById('complete-btn');
  btn.disabled = true;
  document.getElementById('complete-btn-text').textContent = 'DAY COMPLETED ✓';

  // Celebrate
  const msgs = [
    'You crushed ' + activeDay.name + '! Rest up.',
    activeDay.exercises.length + ' exercises done. Beast mode! 💪',
    'One more step toward your goals.',
    'Next up: ' + DAYS[state.currentDayIdx].name,
  ];
  document.getElementById('celebrate-sub').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('celebrate').classList.add('show');
}

function closeCelebrate() {
  document.getElementById('celebrate').classList.remove('show');
  switchTab('home');
}

// ═══════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════
function switchDashTab(tab, btn) {
  state.dashTab = tab;
  document.querySelectorAll('.dash-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDashboard();
}

function renderDashboard() {
  const entries = Object.entries(state.log);
  const completed = entries.filter(([,e]) => e.isDone && !e.isRest);
  const rests = entries.filter(([,e]) => e.isRest);
  const best = calcBestStreak();
  const rate = entries.length > 0 ? Math.round((completed.length / Math.max(entries.filter(([k]) => k <= todayKey()).length, 1)) * 100) : 0;

  document.getElementById('ds-completed').textContent = completed.length;
  document.getElementById('ds-rest').textContent = rests.length;
  document.getElementById('ds-streak').textContent = best;
  document.getElementById('ds-rate').textContent = rate + '%';

  // Calendar
  const content = document.getElementById('dash-content');
  content.innerHTML = '';

  if (state.dashTab === 'month') {
    renderMonthCal(content, state.dashYear, state.dashMonth);
  } else {
    renderYearView(content, state.dashYear);
  }

  // Type breakdown
  const typeCounts = {};
  DAYS.forEach(d => typeCounts[d.id] = 0);
  completed.forEach(([,e]) => { if (typeCounts[e.dayId] !== undefined) typeCounts[e.dayId]++; });
  const maxCount = Math.max(...Object.values(typeCounts), 1);
  const bars = document.getElementById('type-bars');
  bars.innerHTML = '';
  DAYS.forEach(d => {
    const pct = Math.round((typeCounts[d.id] / maxCount) * 100);
    bars.innerHTML += `
      <div class="dt-bar">
        <div class="dt-label" style="color:${d.color}">${d.name.split(' ')[0]}</div>
        <div class="dt-track"><div class="dt-fill" style="width:${pct}%;background:${d.color}"></div></div>
        <div class="dt-count">${typeCounts[d.id]}</div>
      </div>`;
  });
}

function renderMonthCal(container, year, month) {
  const wrap = document.createElement('div');
  wrap.className = 'cal-wrap';

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now = new Date();

  const header = document.createElement('div');
  header.className = 'cal-month-title';
  header.innerHTML = `
    <button class="cal-nav" onclick="prevMonth()">‹</button>
    ${monthNames[month]} ${year}
    <button class="cal-nav" onclick="nextMonth()">›</button>
  `;
  wrap.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'cal-grid';

  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const dh = document.createElement('div');
    dh.className = 'cal-dow';
    dh.textContent = d;
    grid.appendChild(dh);
  });

  const first = new Date(year, month, 1).getDay();
  for (let i = 0; i < first; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(year, month, d);
    const key = dateObj.toISOString().split('T')[0];
    const entry = state.log[key];
    const isToday = key === todayKey();
    const isFuture = dateObj > now && !isToday;

    const el = document.createElement('div');
    let cls = 'cal-day ';
    let icon = '';

    if (isFuture) { cls += 'future'; icon = ''; }
    else if (entry && entry.isRest) { cls += 'rest'; icon = '✕'; }
    else if (entry && entry.isDone && !entry.isPartial) { cls += 'completed'; icon = '✓'; }
    else if (entry && entry.isDone && entry.isPartial) { cls += 'partial'; icon = '~'; }
    else if (!isFuture && !isToday) { cls += 'skipped'; icon = ''; }
    else { cls += 'future'; icon = ''; }

    if (isToday) cls += ' today';
    el.className = cls;
    el.innerHTML = `<div class="cal-day-num">${d}</div><div class="cal-day-icon">${icon}</div>`;
    grid.appendChild(el);
  }

  wrap.appendChild(grid);

  // Legend
  const legend = document.createElement('div');
  legend.className = 'cal-legend';
  legend.innerHTML = `
    <div class="leg-item"><div class="leg-dot" style="background:rgba(34,197,94,0.5)"></div>Completed</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(239,68,68,0.4)"></div>Rest</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(240,192,64,0.4)"></div>Partial</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--border)"></div>Upcoming</div>
  `;
  wrap.appendChild(legend);
  container.appendChild(wrap);
}

function renderYearView(container, year) {
  const wrap = document.createElement('div');
  wrap.className = 'cal-wrap';
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();

  const header = document.createElement('div');
  header.className = 'cal-month-title';
  header.innerHTML = `
    <button class="cal-nav" onclick="prevYear()">‹</button>
    ${year} Overview
    <button class="cal-nav" onclick="nextYear()">›</button>
  `;
  wrap.appendChild(header);

  // Mini month grids for each month
  monthNames.forEach((mn, mi) => {
    const mwrap = document.createElement('div');
    mwrap.style.marginBottom = '16px';

    const mhead = document.createElement('div');
    mhead.style.cssText = 'font-size:11px;font-weight:800;letter-spacing:1px;color:var(--muted2);text-transform:uppercase;margin-bottom:6px;';
    mhead.textContent = mn;
    mwrap.appendChild(mhead);

    const mgrid = document.createElement('div');
    mgrid.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:3px;';

    const first = new Date(year, mi, 1).getDay();
    for (let i = 0; i < first; i++) {
      const e = document.createElement('div');
      e.style.cssText = 'aspect-ratio:1;border-radius:4px;';
      mgrid.appendChild(e);
    }

    const dim = new Date(year, mi + 1, 0).getDate();
    for (let d = 1; d <= dim; d++) {
      const dateObj = new Date(year, mi, d);
      const key = dateObj.toISOString().split('T')[0];
      const entry = state.log[key];
      const isFuture = dateObj > now;

      let bg = 'var(--card)';
      if (entry && entry.isRest) bg = 'rgba(239,68,68,0.4)';
      else if (entry && entry.isDone) bg = 'rgba(34,197,94,0.5)';
      else if (!isFuture) bg = 'rgba(90,92,110,0.2)';

      const el = document.createElement('div');
      el.style.cssText = `aspect-ratio:1;border-radius:4px;background:${bg};`;
      if (key === todayKey()) el.style.outline = '1px solid var(--accent)';
      mgrid.appendChild(el);
    }
    mwrap.appendChild(mgrid);
    wrap.appendChild(mwrap);
  });

  container.appendChild(wrap);
}

function prevMonth() {
  state.dashMonth--;
  if (state.dashMonth < 0) { state.dashMonth = 11; state.dashYear--; }
  renderDashboard();
}
function nextMonth() {
  state.dashMonth++;
  if (state.dashMonth > 11) { state.dashMonth = 0; state.dashYear++; }
  renderDashboard();
}
function prevYear() { state.dashYear--; renderDashboard(); }
function nextYear() { state.dashYear++; renderDashboard(); }

function calcBestStreak() {
  const keys = Object.keys(state.log).sort();
  let best = 0, cur = 0;
  let prev = null;
  keys.forEach(k => {
    const e = state.log[k];
    if (e && (e.isDone || e.isRest)) {
      if (prev) {
        const d1 = new Date(prev), d2 = new Date(k);
        const diff = (d2 - d1) / 86400000;
        if (diff === 1) cur++;
        else cur = 1;
      } else cur = 1;
      best = Math.max(best, cur);
      prev = k;
    } else { cur = 0; prev = null; }
  });
  return best;
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════
// GREETING
// ═══════════════════════════════════════════════════
function updateGreeting() {
  const h = new Date().getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.querySelector('.home-greeting').textContent = greet;
}

// ═══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadState();
  setTimeout(() => {
    document.getElementById('splash').classList.remove('active');
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('home').classList.add('active');
    updateGreeting();
    renderHome();
  }, 1400);
});
</script>
